<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - Portfolio</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Portfolio</div>
        <ul class="nav-links">
            <li><a href="/">首页</a></li>
            <li><a href="/projects">项目</a></li>
            <li><a href="/skills">技能</a></li>
            <li><a href="/contact" class="active">联系</a></li>
        </ul>
    </nav>
    
    <main class="container">
        <h1 class="page-title">联系我</h1>
        
        <div th:if="${success}" class="success-message">
            <p>谢谢，<span th:text="${name}">朋友</span>！你的消息已发送。</p>
        </div>
        
        <form action="/contact" method="post" class="contact-form">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">消息</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">发送消息</button>
        </form>
        
        <div class="contact-info">
            <p>📧 Email: yao609475298@gmail.com</p>
            <p>🔗 GitHub: <a href="https://github.com/ShadinYao" target="_blank">ShadinYao</a></p>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Shadin Yao. All rights reserved.</p>
    </footer>
</body>
</html>
